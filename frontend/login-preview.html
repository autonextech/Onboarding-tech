<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Unified Preview</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    .preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .preview-header {
      padding: 12px 16px;
      background: #F8FAFC;
      color: #0F172A;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #E2E8F0;
      border-right: 1px solid #E2E8F0;
    }
    .preview-title {
      font-weight: 600;
      font-size: 14px;
    }
    .color-swatches {
      display: flex;
      gap: 6px;
    }
    .swatch {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.1);
    }
    iframe {
      flex: 1;
      border: none;
      width: 100%;
      height: 100%;
      border-right: 1px solid #E2E8F0;
      background: #F8FAFC;
    }
  </style>
</head>
<body>
  <!-- Candidate Portal -->
  <div class="preview-pane">
    <div class="preview-header">
      <div class="preview-title">Candidate Portal</div>
      <div class="color-swatches">
        <div class="swatch" style="background-color: #1E40AF" title="Navy 700"></div>
        <div class="swatch" style="background-color: #0EA5E9" title="Sky 500"></div>
      </div>
    </div>
    <!-- Point to Vite dev server's default port -->
    <iframe src="http://localhost:5173/login"></iframe>
  </div>

  <!-- Admin Portal -->
  <div class="preview-pane">
    <div class="preview-header">
      <div class="preview-title" style="color: #0D1B4C">Admin Portal</div>
      <div class="color-swatches">
        <div class="swatch" style="background-color: #0D1B4C" title="Navy 900"></div>
        <div class="swatch" style="background-color: #2563EB" title="Navy 600"></div>
      </div>
    </div>
    <!-- Point to Admin Login -->
    <iframe src="http://localhost:5173/admin/login"></iframe>
  </div>
</body>
</html>
